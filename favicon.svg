<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#04060a"/>
  <!-- outer triangle (PCR) -->
  <polygon points="32,10 54,52 10,52" fill="none" stroke="#4fd1ff" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- inner cross (QR axes) -->
  <line x1="32" y1="22" x2="32" y2="44" stroke="#ff3d9a" stroke-width="1.2" stroke-dasharray="2,2"/>
  <line x1="20" y1="33" x2="44" y2="33" stroke="#ff3d9a" stroke-width="1.2" stroke-dasharray="2,2"/>
  <!-- center dot (interface) -->
  <circle cx="32" cy="33" r="2.5" fill="#ff3d9a"/>
  <circle cx="32" cy="33" r="5" fill="none" stroke="#ff3d9a" stroke-width="0.6" opacity="0.5"/>
</svg>
